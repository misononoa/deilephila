name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  # PR 時のみ Claude によるコードレビューを実施する(advisory。マージ判断は人間が行う)
  claude-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            この PR をレビューしてください。観点:
            - 正当性: バグ・エッジケース・エラーハンドリングの不備
            - 設計整合: CLAUDE.md および docs/ の設計(データモデル・並行性方針・用語)との整合
            - テスト: 変更に対するテストの有無と妥当性
            - セキュリティ: 署名検証・鍵管理まわりの取り扱い

            指摘は該当行へのインラインコメントで残し、最後に総評を PR コメントとして投稿してください。
            軽微なスタイル指摘よりも、動作に影響する問題を優先してください。
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
